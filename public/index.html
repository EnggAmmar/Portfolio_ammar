  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      (function () {
        const oldTitle = "Electromechanical System Development";
        const oldDesc = "System-level mechanical development involving packaged assemblies, component positioning, actuator and sensor accommodation, and design coordination across mechanical and electrical interfaces.";
        const newTitle = "CFD Aerodynamic Analysis of a Towing Vehicle–Trailer System";
        const newDesc = "ANSYS Fluent simulation of airflow, pressure distribution, and force coefficients for a towing vehicle and trailer setup. The study examined wake behavior, velocity fields, pressure loading, and convergence trends to evaluate aerodynamic performance and support design decisions.";
        const newTags = ["CFD", "Aerodynamics", "ANSYS Fluent"];

        function replaceProjectCardText() {
          document.querySelectorAll(".project-selector-title").forEach(function (node) {
            if (node.textContent.trim() === oldTitle) {
              node.textContent = newTitle;
              const card = node.closest(".project-selector-card");
              if (card) {
                const desc = card.querySelector(".project-selector-desc");
                const tags = card.querySelector(".project-selector-tags");
                if (desc) desc.textContent = newDesc;
                if (tags) {
                  tags.innerHTML = newTags
                    .map(function (tag) { return '<span class="project-tag">' + tag + '</span>'; })
                    .join("");
                }
              }
            }
          });

          document.querySelectorAll("h1, h2, h3, h4, h5, h6, p, span, div").forEach(function (node) {
            if (node.children.length === 0) {
              const text = node.textContent.trim();
              if (text === oldTitle) node.textContent = newTitle;
              if (text === oldDesc) node.textContent = newDesc;
            }
          });
        }

        replaceProjectCardText();
        const observer = new MutationObserver(replaceProjectCardText);
        observer.observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
