<svg viewBox="0 0 760 580" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="11">
  <defs>
    <linearGradient id="railTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F0F0"/>
      <stop offset="40%" stop-color="#D0D0D0"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
    <linearGradient id="railSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C0C0C0"/>
      <stop offset="100%" stop-color="#808080"/>
    </linearGradient>
    <linearGradient id="plaTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#C0C0C0"/>
    </linearGradient>
    <linearGradient id="plaFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8D8D8"/>
      <stop offset="100%" stop-color="#A8A8A8"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="50%" stop-color="#B8B8B8"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
    <linearGradient id="encoderG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <linearGradient id="servoG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#505050"/>
      <stop offset="100%" stop-color="#202020"/>
    </linearGradient>
    <linearGradient id="ballG" cx="40%" cy="35%" r="60%" fx="40%" fy="35%" gradientUnits="objectBoundingBox" id="ballG" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="60%" stop-color="#C0C0C0"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
  </defs>

  <rect width="760" height="580" fill="#F8F8F8"/>
  <!-- Title -->
  <rect x="0" y="0" width="760" height="35" fill="#2a2a2a"/>
  <text x="380" y="23" text-anchor="middle" fill="white" font-size="14" font-weight="bold">ARM EXOSKELETON – CAD Model (Isometric View) | FreeCAD / PLA + Steel</text>

  <!-- ═══ ISOMETRIC EXOSKELETON ═══ 
       Isometric offset: x' = x - y*0.5, y' = -z + (x+y)*0.25
       Main arm runs top (shoulder) to bottom (wrist)
       Center column x=370 -->

  <!-- ── SHOULDER MOUNT PLATE ── -->
  <!-- Top face -->
  <polygon points="310,85 430,85 450,100 330,100" fill="url(#plaTop)" stroke="#888" stroke-width="1"/>
  <!-- Front face -->
  <polygon points="330,100 450,100 450,118 330,118" fill="url(#plaFront)" stroke="#888" stroke-width="1"/>
  <!-- Side face -->
  <polygon points="430,85 450,100 450,118 430,103" fill="#B0B0B0" stroke="#888" stroke-width="1"/>
  <text x="375" y="112" text-anchor="middle" fill="#555" font-size="10">Shoulder mount plate</text>

  <!-- ── BALL JOINT (shoulder) ── -->
  <ellipse cx="380" cy="140" rx="28" ry="16" fill="#D0D0D0" stroke="#888" stroke-width="1"/>
  <circle cx="380" cy="135" r="24" fill="url(#metalGrad)" stroke="#888" stroke-width="1.2"/>
  <!-- equatorial ring -->
  <ellipse cx="380" cy="135" rx="24" ry="7" fill="none" stroke="#AAA" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- meridian arc -->
  <path d="M380,111 A24,24 0 0,1 380,159" fill="none" stroke="#AAA" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="415" y="132" fill="#333" font-size="10">Ball joint</text>
  <text x="415" y="144" fill="#333" font-size="10">3-DOF</text>
  <!-- DOF arcs -->
  <path d="M358,120 A30,15 0 0,1 402,120" fill="none" stroke="#555" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- ── ENCODER disc shoulder ── -->
  <ellipse cx="380" cy="162" rx="12" ry="5" fill="url(#encoderG)" stroke="#444" stroke-width="1"/>
  <text x="398" y="165" fill="#333" font-size="9">Encoder</text>

  <!-- ── SERVO BRAKE shoulder ── -->
  <polygon points="358,170 398,170 405,178 365,178" fill="url(#servoG)" stroke="#333" stroke-width="1"/>
  <polygon points="365,178 405,178 405,188 365,188" fill="#3a3a3a" stroke="#333" stroke-width="1"/>
  <polygon points="398,170 405,178 405,188 398,180" fill="#282828" stroke="#333" stroke-width="1"/>
  <text x="412" y="183" fill="#333" font-size="9">Servo brake</text>

  <!-- ── UPPER ARM RAIL TUBE ── (8mm dia steel, isometric box) -->
  <!-- Rail front face -->
  <polygon points="368,192 392,192 392,310 368,310" fill="#CCCCCC" stroke="#888" stroke-width="1"/>
  <!-- Rail top face -->
  <polygon points="360,185 400,185 392,192 368,192" fill="#E8E8E8" stroke="#888" stroke-width="1"/>
  <!-- Rail side face -->
  <polygon points="400,185 392,192 392,310 400,303" fill="#A8A8A8" stroke="#888" stroke-width="1"/>
  <!-- centerline -->
  <line x1="380" y1="192" x2="380" y2="310" stroke="#888" stroke-width="0.5" stroke-dasharray="6,3"/>
  <text x="406" y="250" fill="#333" font-size="10">Steel rail</text>
  <text x="406" y="261" fill="#555" font-size="9">Ø8mm</text>

  <!-- ── UPPER ARM CARRIAGE (q4) ── -->
  <!-- Top face -->
  <polygon points="354,235 406,235 414,242 362,242" fill="url(#plaTop)" stroke="#777" stroke-width="1"/>
  <!-- Front face -->
  <polygon points="362,242 414,242 414,262 362,262" fill="url(#plaFront)" stroke="#777" stroke-width="1"/>
  <!-- Side face -->
  <polygon points="406,235 414,242 414,262 406,255" fill="#B0B0B0" stroke="#777" stroke-width="1"/>
  <!-- slide arrows -->
  <line x1="380" y1="232" x2="380" y2="218" stroke="#333" stroke-width="1.2" marker-end="url(#cadarr)"/>
  <line x1="380" y1="265" x2="380" y2="279" stroke="#333" stroke-width="1.2" marker-end="url(#cadarr)"/>
  <text x="420" y="252" fill="#333" font-size="10">q₄ slider</text>

  <!-- vibration motors upper arm -->
  <ellipse cx="363" cy="215" rx="5" ry="3" fill="#999" stroke="#666" stroke-width="0.8"/>
  <ellipse cx="363" cy="285" rx="5" ry="3" fill="#999" stroke="#666" stroke-width="0.8"/>
  <text x="350" y="215" text-anchor="end" fill="#555" font-size="9">Vib.</text>

  <!-- UPPER ARM STRAP -->
  <path d="M345,250 Q330,252 345,262" fill="none" stroke="#555" stroke-width="3" stroke-dasharray="5,2"/>
  <path d="M415,250 Q430,252 415,262" fill="none" stroke="#555" stroke-width="3" stroke-dasharray="5,2"/>
  <text x="324" y="254" text-anchor="end" fill="#555" font-size="9">Strap</text>

  <!-- ── ELBOW HINGE ── -->
  <!-- Hinge body isometric box -->
  <polygon points="348,312 412,312 420,320 356,320" fill="url(#plaTop)" stroke="#777" stroke-width="1"/>
  <polygon points="356,320 420,320 420,336 356,336" fill="url(#plaFront)" stroke="#777" stroke-width="1"/>
  <polygon points="412,312 420,320 420,336 412,328" fill="#A8A8A8" stroke="#777" stroke-width="1"/>
  <!-- Hinge pin cylinder -->
  <ellipse cx="380" cy="320" rx="10" ry="5" fill="url(#metalGrad)" stroke="#888" stroke-width="1"/>
  <rect x="370" y="320" width="20" height="14" fill="#C0C0C0" stroke="#888" stroke-width="0.8"/>
  <ellipse cx="380" cy="334" rx="10" ry="5" fill="#B0B0B0" stroke="#888" stroke-width="1"/>
  <!-- hinge rotation arc -->
  <path d="M355,310 A32,15 0 0,1 405,310" fill="none" stroke="#555" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="428" y="328" fill="#333" font-size="10">Elbow (q₅)</text>
  <!-- Encoder + brake elbow -->
  <ellipse cx="380" cy="340" rx="10" ry="4" fill="url(#encoderG)" stroke="#444" stroke-width="1"/>
  <polygon points="358,346 402,346 408,352 364,352" fill="url(#servoG)" stroke="#333" stroke-width="1"/>
  <polygon points="364,352 408,352 408,360 364,360" fill="#3a3a3a" stroke="#333" stroke-width="1"/>

  <!-- ── FOREARM RAIL TUBE ── -->
  <polygon points="368,362 392,362 392,458 368,458" fill="#CCCCCC" stroke="#888" stroke-width="1"/>
  <polygon points="360,356 400,356 392,362 368,362" fill="#E8E8E8" stroke="#888" stroke-width="1"/>
  <polygon points="400,356 392,362 392,458 400,452" fill="#A8A8A8" stroke="#888" stroke-width="1"/>
  <line x1="380" y1="362" x2="380" y2="458" stroke="#888" stroke-width="0.5" stroke-dasharray="6,3"/>
  <text x="406" y="412" fill="#333" font-size="10">Forearm rail</text>

  <!-- ── FOREARM CARRIAGE (q6) ── -->
  <polygon points="354,400 406,400 414,407 362,407" fill="url(#plaTop)" stroke="#777" stroke-width="1"/>
  <polygon points="362,407 414,407 414,422 362,422" fill="url(#plaFront)" stroke="#777" stroke-width="1"/>
  <polygon points="406,400 414,407 414,422 406,415" fill="#B0B0B0" stroke="#777" stroke-width="1"/>
  <line x1="380" y1="397" x2="380" y2="385" stroke="#333" stroke-width="1.2" marker-end="url(#cadarr)"/>
  <line x1="380" y1="425" x2="380" y2="437" stroke="#333" stroke-width="1.2" marker-end="url(#cadarr)"/>
  <text x="420" y="415" fill="#333" font-size="10">q₆ slider</text>

  <!-- vibration motors forearm -->
  <ellipse cx="363" cy="375" rx="5" ry="3" fill="#999" stroke="#666" stroke-width="0.8"/>
  <ellipse cx="363" cy="440" rx="5" ry="3" fill="#999" stroke="#666" stroke-width="0.8"/>

  <!-- FOREARM STRAP -->
  <path d="M345,410 Q330,413 345,420" fill="none" stroke="#555" stroke-width="3" stroke-dasharray="5,2"/>
  <path d="M415,410 Q430,413 415,420" fill="none" stroke="#555" stroke-width="3" stroke-dasharray="5,2"/>

  <!-- ── WRIST JOINT ── -->
  <polygon points="358,460 402,460 410,467 366,467" fill="url(#plaTop)" stroke="#777" stroke-width="1"/>
  <polygon points="366,467 410,467 410,480 366,480" fill="url(#plaFront)" stroke="#777" stroke-width="1"/>
  <polygon points="402,460 410,467 410,480 402,473" fill="#A8A8A8" stroke="#777" stroke-width="1"/>
  <ellipse cx="380" cy="463" rx="9" ry="4" fill="url(#metalGrad)" stroke="#888" stroke-width="1"/>
  <path d="M360,457 A28,12 0 0,1 400,457" fill="none" stroke="#555" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="416" y="473" fill="#333" font-size="10">Wrist (q₇)</text>
  <!-- Encoder wrist -->
  <ellipse cx="380" cy="482" rx="10" ry="4" fill="url(#encoderG)" stroke="#444" stroke-width="1"/>

  <!-- ── ESP32 PCB BOARDS ── -->
  <g transform="translate(220,200)">
    <polygon points="0,0 60,0 66,6 6,6" fill="#1a5c1a" stroke="#0a3a0a" stroke-width="1"/>
    <polygon points="6,6 66,6 66,32 6,32" fill="#1e6e1e" stroke="#0a3a0a" stroke-width="1"/>
    <polygon points="60,0 66,6 66,32 60,26" fill="#145014" stroke="#0a3a0a" stroke-width="1"/>
    <!-- chips -->
    <rect x="12" y="10" width="15" height="10" fill="#333" stroke="#222" stroke-width="0.5"/>
    <rect x="32" y="10" width="12" height="10" fill="#222" stroke="#111" stroke-width="0.5"/>
    <text x="33" y="40" text-anchor="middle" fill="#333" font-size="9">ESP-S30 MCU</text>
    <!-- wires to arm -->
    <line x1="66" y1="18" x2="106" y2="18" stroke="#C00" stroke-width="1.5" stroke-dasharray="4,2"/>
  </g>

  <!-- Arrow marker for CAD -->
  <defs>
    <marker id="cadarr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#333"/>
    </marker>
  </defs>

  <!-- LEGEND -->
  <rect x="30" y="380" width="200" height="110" fill="white" stroke="#aaa" stroke-width="1" rx="4"/>
  <text x="130" y="397" text-anchor="middle" font-size="11" font-weight="bold" fill="#222">MATERIALS</text>
  <rect x="42" y="407" width="20" height="10" fill="#CCCCCC" stroke="#888" stroke-width="0.8"/>
  <text x="68" y="417" font-size="10" fill="#333">Steel rail (8 mm Ø, precision)</text>
  <rect x="42" y="422" width="20" height="10" fill="url(#plaFront)" stroke="#888" stroke-width="0.8"/>
  <text x="68" y="432" font-size="10" fill="#333">PLA 3D-printed parts</text>
  <rect x="42" y="437" width="20" height="10" fill="url(#servoG)" stroke="#333" stroke-width="0.8"/>
  <text x="68" y="447" font-size="10" fill="#333">Servo / encoder (metal)</text>
  <rect x="42" y="452" width="20" height="10" fill="#1e6e1e" stroke="#0a3a0a" stroke-width="0.8"/>
  <text x="68" y="462" font-size="10" fill="#333">PCB / ESP-S30</text>
  <path d="M42,472 Q40,477 42,482" fill="none" stroke="#555" stroke-width="3" stroke-dasharray="4,2"/>
  <text x="52" y="480" font-size="10" fill="#333">Neoprene strap</text>

  <!-- Notes -->
  <rect x="30" y="50" width="200" height="75" fill="white" stroke="#aaa" stroke-width="1" rx="4"/>
  <text x="130" y="67" text-anchor="middle" font-size="11" font-weight="bold" fill="#222">SPECS</text>
  <text x="42" y="82" font-size="10" fill="#333">Total weight: ~2 kg</text>
  <text x="42" y="95" font-size="10" fill="#333">DOF: 7 (3 shoulder + 2 elbow/wrist)</text>
  <text x="42" y="108" font-size="10" fill="#333">Encoders: 7× AS5600 (12-bit)</text>
  <text x="42" y="121" font-size="10" fill="#333">Vib. motors: 24× embedded</text>
</svg>
