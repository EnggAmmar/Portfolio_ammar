<svg viewBox="0 0 820 620" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#111"/></marker>
    <marker id="sarr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#444"/></marker>
    <marker id="aarr" markerWidth="7" markerHeight="7" refX="0" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#111"/></marker>
  </defs>

  <!-- Page bg + border -->
  <rect width="820" height="620" fill="white"/>
  <rect x="8" y="8" width="804" height="604" fill="none" stroke="#000" stroke-width="1.5"/>
  <rect x="8" y="576" width="804" height="36" fill="none" stroke="#000" stroke-width="1"/>
  <text x="414" y="599" text-anchor="middle" font-size="12" font-weight="bold">SCARA-STYLE 3-DOF ROBOT ARM (RRP) — Engineering Sketch | PID Controlled</text>

  <!-- ═══ FRONT / SIDE SCHEMATIC (left panel) ═══ -->
  <!-- Ground base plate -->
  <rect x="60" y="500" width="120" height="16" fill="#ddd" stroke="#000" stroke-width="1.2" rx="2"/>
  <!-- Hatching for ground -->
  <line x1="63" y1="516" x2="60" y2="520" stroke="#000" stroke-width="0.7"/>
  <line x1="73" y1="516" x2="68" y2="522" stroke="#000" stroke-width="0.7"/>
  <line x1="83" y1="516" x2="78" y2="522" stroke="#000" stroke-width="0.7"/>
  <line x1="93" y1="516" x2="88" y2="522" stroke="#000" stroke-width="0.7"/>
  <line x1="103" y1="516" x2="98" y2="522" stroke="#000" stroke-width="0.7"/>
  <line x1="113" y1="516" x2="108" y2="522" stroke="#000" stroke-width="0.7"/>
  <line x1="123" y1="516" x2="118" y2="522" stroke="#000" stroke-width="0.7"/>
  <line x1="133" y1="516" x2="128" y2="522" stroke="#000" stroke-width="0.7"/>
  <line x1="143" y1="516" x2="138" y2="522" stroke="#000" stroke-width="0.7"/>
  <line x1="153" y1="516" x2="148" y2="522" stroke="#000" stroke-width="0.7"/>
  <line x1="163" y1="516" x2="158" y2="522" stroke="#000" stroke-width="0.7"/>
  <line x1="173" y1="516" x2="168" y2="522" stroke="#000" stroke-width="0.7"/>
  <!-- Base column -->
  <rect x="102" y="420" width="36" height="80" fill="#eee" stroke="#000" stroke-width="1.2" rx="2"/>
  <line x1="120" y1="420" x2="120" y2="500" stroke="#888" stroke-width="0.6" stroke-dasharray="4,3"/>

  <!-- JOINT 1 — Revolute, base rotation (θ₁) -->
  <circle cx="120" cy="415" r="18" fill="white" stroke="#000" stroke-width="1.5"/>
  <circle cx="120" cy="415" r="6" fill="#ccc" stroke="#000" stroke-width="1"/>
  <!-- rotation arc J1 -->
  <path d="M100,415 A20,20 0 0,1 140,415" fill="none" stroke="#444" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#sarr)"/>
  <text x="122" y="395" font-size="10" font-weight="bold">θ₁</text>
  <text x="38" y="418" text-anchor="end" font-size="10">Joint 1</text>
  <text x="38" y="429" text-anchor="end" font-size="10">Revolute</text>

  <!-- LINK 1 (upper arm) — horizontal from J1 -->
  <rect x="120" y="406" width="130" height="18" fill="#ddd" stroke="#000" stroke-width="1.2" rx="3"/>
  <line x1="185" y1="406" x2="185" y2="424" stroke="#888" stroke-width="0.5" stroke-dasharray="3,2"/>
  <!-- dimension line for link 1 -->
  <line x1="122" y1="432" x2="248" y2="432" stroke="#000" stroke-width="0.7"/>
  <line x1="122" y1="428" x2="122" y2="436" stroke="#000" stroke-width="0.7"/>
  <line x1="248" y1="428" x2="248" y2="436" stroke="#000" stroke-width="0.7"/>
  <text x="185" y="444" text-anchor="middle" font-size="10">L₁ = 300 mm</text>

  <!-- JOINT 2 — Revolute, shoulder (θ₂) -->
  <circle cx="250" cy="415" r="18" fill="white" stroke="#000" stroke-width="1.5"/>
  <circle cx="250" cy="415" r="6" fill="#ccc" stroke="#000" stroke-width="1"/>
  <path d="M250,397 A20,20 0 0,1 268,415" fill="none" stroke="#444" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#sarr)"/>
  <text x="256" y="395" font-size="10" font-weight="bold">θ₂</text>
  <text x="275" y="408" font-size="10">Joint 2</text>
  <text x="275" y="419" font-size="10">Revolute</text>

  <!-- LINK 2 (forearm) — angled -->
  <rect x="250" y="406" width="110" height="18" fill="#ddd" stroke="#000" stroke-width="1.2" rx="3"/>
  <!-- dimension line link 2 -->
  <line x1="252" y1="432" x2="358" y2="432" stroke="#000" stroke-width="0.7"/>
  <line x1="252" y1="428" x2="252" y2="436" stroke="#000" stroke-width="0.7"/>
  <line x1="358" y1="428" x2="358" y2="436" stroke="#000" stroke-width="0.7"/>
  <text x="305" y="444" text-anchor="middle" font-size="10">L₂ = 200 mm</text>

  <!-- JOINT 3 — Prismatic, vertical (d₃) -->
  <!-- Z-rail housing -->
  <rect x="346" y="340" width="28" height="76" fill="#eee" stroke="#000" stroke-width="1.2" rx="3"/>
  <!-- Prismatic slider block -->
  <rect x="340" y="390" width="40" height="22" fill="#ccc" stroke="#000" stroke-width="1.2" rx="2"/>
  <!-- Rail center dashed -->
  <line x1="360" y1="340" x2="360" y2="416" stroke="#888" stroke-width="0.5" stroke-dasharray="5,3"/>
  <!-- bidirectional arrow for prismatic -->
  <line x1="378" y1="350" x2="378" y2="410" stroke="#000" stroke-width="1" marker-end="url(#arr)" marker-start="url(#aarr)"/>
  <text x="383" y="368" font-size="10" font-weight="bold">d₃</text>
  <text x="383" y="380" font-size="10">Prismatic</text>
  <text x="383" y="391" font-size="10">0–200 mm</text>

  <!-- End-effector -->
  <rect x="344" y="316" width="32" height="24" fill="#bbb" stroke="#000" stroke-width="1.2" rx="2"/>
  <!-- gripper fingers -->
  <rect x="344" y="302" width="10" height="14" fill="#888" stroke="#000" stroke-width="1" rx="1"/>
  <rect x="366" y="302" width="10" height="14" fill="#888" stroke="#000" stroke-width="1" rx="1"/>
  <text x="408" y="312" font-size="10" font-weight="bold">End-effector</text>
  <text x="408" y="323" font-size="10">(gripper)</text>

  <!-- Coordinate frame at base -->
  <g transform="translate(60,480)">
    <line x1="0" y1="0" x2="28" y2="0" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="0" y1="0" x2="0" y2="-28" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="0" y1="0" x2="-14" y2="14" stroke="#000" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arr)"/>
    <text x="30" y="4" font-size="10">x</text>
    <text x="3" y="-30" font-size="10">z</text>
    <text x="-24" y="22" font-size="10">y</text>
  </g>

  <!-- DH params table -->
  <rect x="28" y="50" width="215" height="135" fill="none" stroke="#000" stroke-width="1"/>
  <text x="136" y="68" text-anchor="middle" font-size="11" font-weight="bold">DH Parameters</text>
  <line x1="28" y1="72" x2="243" y2="72" stroke="#000" stroke-width="0.7"/>
  <text x="45"  y="86" font-size="9" font-weight="bold">Joint</text>
  <text x="85"  y="86" font-size="9" font-weight="bold">Type</text>
  <text x="130" y="86" font-size="9" font-weight="bold">θ</text>
  <text x="155" y="86" font-size="9" font-weight="bold">d</text>
  <text x="180" y="86" font-size="9" font-weight="bold">a</text>
  <text x="210" y="86" font-size="9" font-weight="bold">α</text>
  <line x1="28" y1="90" x2="243" y2="90" stroke="#000" stroke-width="0.5"/>
  <text x="45" y="103" font-size="9">1</text><text x="75" y="103" font-size="9">Revolute</text><text x="128" y="103" font-size="9">θ₁</text><text x="153" y="103" font-size="9">0</text><text x="175" y="103" font-size="9">300</text><text x="207" y="103" font-size="9">0°</text>
  <text x="45" y="118" font-size="9">2</text><text x="75" y="118" font-size="9">Revolute</text><text x="128" y="118" font-size="9">θ₂</text><text x="153" y="118" font-size="9">0</text><text x="175" y="118" font-size="9">200</text><text x="207" y="118" font-size="9">0°</text>
  <text x="45" y="133" font-size="9">3</text><text x="75" y="133" font-size="9">Prismatic</text><text x="128" y="133" font-size="9">0</text><text x="153" y="133" font-size="9">d₃</text><text x="175" y="133" font-size="9">0</text><text x="207" y="133" font-size="9">−90°</text>
  <text x="136" y="172" text-anchor="middle" font-size="9">a (mm), α (deg)</text>
  <text x="136" y="183" text-anchor="middle" font-size="9">Workspace: cylindrical, R=500mm, H=200mm</text>

  <!-- ═══ TOP VIEW (right panel) ═══ -->
  <text x="560" y="65" text-anchor="middle" font-size="12" font-weight="bold">TOP VIEW</text>
  <line x1="420" y1="70" x2="790" y2="70" stroke="#000" stroke-width="0.7"/>

  <!-- base circle top view -->
  <circle cx="560" cy="290" r="28" fill="#eee" stroke="#000" stroke-width="1.2"/>
  <circle cx="560" cy="290" r="8" fill="#ccc" stroke="#000" stroke-width="1"/>
  <text x="560" y="328" text-anchor="middle" font-size="10">Base (Joint 1)</text>

  <!-- Link 1 at 0° -->
  <rect x="560" y="284" width="130" height="12" fill="#ddd" stroke="#000" stroke-width="1.2" rx="2"/>
  <!-- J2 top view -->
  <circle cx="690" cy="290" r="16" fill="white" stroke="#000" stroke-width="1.5"/>
  <circle cx="690" cy="290" r="5" fill="#ccc" stroke="#000" stroke-width="1"/>
  <text x="690" y="318" text-anchor="middle" font-size="10">Joint 2</text>
  <!-- Link 2 angled 30° from J2 -->
  <line x1="690" y1="290" x2="762" y2="254" stroke="#000" stroke-width="12" stroke-linecap="round" opacity="0.15"/>
  <line x1="690" y1="290" x2="762" y2="254" stroke="#000" stroke-width="1.5"/>
  <!-- J3 (prismatic, shows as circle in top view) -->
  <circle cx="763" cy="253" r="14" fill="#ccc" stroke="#000" stroke-width="1.5"/>
  <circle cx="763" cy="253" r="5" fill="#888" stroke="#000" stroke-width="1"/>
  <text x="763" y="238" text-anchor="middle" font-size="10">Joint 3</text>
  <text x="763" y="226" text-anchor="middle" font-size="10">(Prismatic)</text>

  <!-- θ₁ arc -->
  <path d="M590,290 A30,30 0 0,1 570,265" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#sarr)"/>
  <text x="595" y="268" font-size="10">θ₁</text>
  <!-- θ₂ arc -->
  <path d="M710,290 A20,20 0 0,1 700,273" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#sarr)"/>
  <text x="714" y="275" font-size="10">θ₂</text>

  <!-- Workspace arc -->
  <path d="M560,90 A200,200 0 0,1 760,290 A200,200 0 0,1 560,490 A200,200 0 0,1 360,290 A200,200 0 0,1 560,90"
        fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="560" y="480" text-anchor="middle" font-size="9" fill="#888">Workspace boundary R=500mm</text>

  <!-- ═══ PID BLOCK DIAGRAM ═══ -->
  <text x="220" y="205" text-anchor="middle" font-size="11" font-weight="bold">PID CONTROL LOOP (per joint)</text>
  <line x1="28" y1="210" x2="415" y2="210" stroke="#000" stroke-width="0.6"/>

  <!-- Setpoint -->
  <text x="35" y="236" font-size="10">r(t)</text>
  <line x1="55" y1="232" x2="78" y2="232" stroke="#000" stroke-width="1" marker-end="url(#arr)"/>
  <!-- Summing junction -->
  <circle cx="90" cy="232" r="12" fill="white" stroke="#000" stroke-width="1.2"/>
  <text x="86" y="236" font-size="11">Σ</text>
  <!-- error -->
  <line x1="102" y1="232" x2="125" y2="232" stroke="#000" stroke-width="1" marker-end="url(#arr)"/>
  <text x="110" y="226" font-size="9">e(t)</text>
  <!-- PID block -->
  <rect x="125" y="220" width="60" height="24" fill="#eee" stroke="#000" stroke-width="1.2" rx="2"/>
  <text x="155" y="236" text-anchor="middle" font-size="11" font-weight="bold">PID</text>
  <!-- u(t) -->
  <line x1="185" y1="232" x2="210" y2="232" stroke="#000" stroke-width="1" marker-end="url(#arr)"/>
  <text x="193" y="226" font-size="9">u(t)</text>
  <!-- Plant block -->
  <rect x="210" y="220" width="70" height="24" fill="#eee" stroke="#000" stroke-width="1.2" rx="2"/>
  <text x="245" y="233" text-anchor="middle" font-size="9">Plant/Joint</text>
  <!-- output -->
  <line x1="280" y1="232" x2="320" y2="232" stroke="#000" stroke-width="1" marker-end="url(#arr)"/>
  <text x="290" y="226" font-size="9">y(t)</text>
  <!-- feedback line -->
  <line x1="320" y1="232" x2="320" y2="258" stroke="#000" stroke-width="1"/>
  <line x1="320" y1="258" x2="90" y2="258" stroke="#000" stroke-width="1"/>
  <line x1="90" y1="258" x2="90" y2="244" stroke="#000" stroke-width="1" marker-end="url(#arr)"/>
  <text x="205" y="270" text-anchor="middle" font-size="9">Feedback (encoder)</text>
  <!-- minus sign -->
  <text x="83" y="248" font-size="10">−</text>

  <!-- PID internals breakdown -->
  <rect x="28" y="285" width="385" height="100" fill="none" stroke="#888" stroke-width="0.8" stroke-dasharray="5,3" rx="3"/>
  <text x="50" y="302" font-size="10" font-weight="bold">PID gains (Simulink-tuned):</text>
  <text x="40" y="318" font-size="9">Joint 1 (θ₁, base):    Kp=1.8   Ki=0.4   Kd=0.7   → OS=12.0%  Ts≈2.0s</text>
  <text x="40" y="333" font-size="9">Joint 2 (θ₂, shoulder): Kp=2.0   Ki=0.5   Kd=0.8   → OS=17.7%  Ts≈1.9s</text>
  <text x="40" y="348" font-size="9">Joint 3 (d₃, prismatic): Kp=2.2   Ki=0.3   Kd=1.0   → OS=7.2%   Ts≈2.0s</text>
  <text x="40" y="365" font-size="9">Setpoints: θ₁=90°  θ₂=45°  d₃=150mm   |   Sensor: optical encoder + linear pot.</text>

  <!-- LEGEND -->
  <rect x="430" y="490" width="220" height="80" fill="none" stroke="#000" stroke-width="1"/>
  <text x="540" y="508" text-anchor="middle" font-size="11" font-weight="bold">LEGEND</text>
  <circle cx="445" cy="524" r="8" fill="white" stroke="#000" stroke-width="1.2"/>
  <circle cx="445" cy="524" r="3" fill="#ccc" stroke="#000" stroke-width="0.8"/>
  <text x="458" y="528" font-size="10">Revolute joint (R)</text>
  <rect x="437" y="538" width="16" height="10" fill="#ccc" stroke="#000" stroke-width="1" rx="1"/>
  <text x="458" y="547" font-size="10">Prismatic joint (P) / slider</text>
  <rect x="437" y="553" width="26" height="9" fill="#ddd" stroke="#000" stroke-width="1" rx="1"/>
  <text x="468" y="561" font-size="10">Rigid link</text>
</svg>
