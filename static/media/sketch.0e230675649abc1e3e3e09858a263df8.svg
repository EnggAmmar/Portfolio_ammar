<svg viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#000"/></marker>
    <marker id="sarr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#444"/></marker>
    <marker id="arrb" markerWidth="8" markerHeight="8" refX="0" refY="3" orient="auto"><path d="M6,0 L0,3 L6,6 Z" fill="#000"/></marker>
  </defs>
  <rect width="760" height="560" fill="white"/>
  <rect x="10" y="10" width="740" height="540" fill="none" stroke="#000" stroke-width="1.5"/>
  <rect x="10" y="510" width="740" height="40" fill="none" stroke="#000" stroke-width="1"/>
  <text x="380" y="532" text-anchor="middle" font-size="13" font-weight="bold">ARM EXOSKELETON – Technical Sketch | Group 6 | MDP WS25/26</text>

  <!-- COORDINATE AXES -->
  <g transform="translate(90,105)">
    <line x1="0" y1="0" x2="0" y2="-35" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="0" y1="0" x2="35" y2="0" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="0" y1="0" x2="-18" y2="18" stroke="#000" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
    <text x="3" y="-38" font-size="10">z</text>
    <text x="38" y="4" font-size="10">x</text>
    <text x="-30" y="28" font-size="10">y</text>
  </g>

  <!-- SHOULDER BALL JOINT -->
  <rect x="110" y="118" width="60" height="8" fill="#ddd" stroke="#000" stroke-width="1.2" rx="2"/>
  <circle cx="140" cy="135" r="18" fill="none" stroke="#000" stroke-width="1.5"/>
  <ellipse cx="140" cy="135" rx="18" ry="6" fill="none" stroke="#000" stroke-width="0.8" stroke-dasharray="3,2"/>
  <ellipse cx="140" cy="135" rx="6" ry="18" fill="none" stroke="#000" stroke-width="0.8" stroke-dasharray="3,2"/>
  <path d="M122,130 A20,20 0 0,1 140,112" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#sarr)"/>
  <path d="M140,158 A20,20 0 0,1 160,135" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#sarr)"/>
  <path d="M133,116 A10,10 0 0,1 148,116" fill="none" stroke="#555" stroke-width="1" marker-end="url(#sarr)"/>
  <text x="170" y="122" font-size="10">q&#x2081; (abduction/adduction)</text>
  <text x="170" y="134" font-size="10">q&#x2082; (flexion/extension)</text>
  <text x="170" y="146" font-size="10">q&#x2083; (internal rotation)</text>
  <text x="56" y="128" text-anchor="middle" font-size="10" font-weight="bold">Shoulder</text>
  <text x="56" y="140" text-anchor="middle" font-size="10">3-DOF ball joint</text>

  <!-- Encoder shoulder -->
  <circle cx="140" cy="158" r="6" fill="none" stroke="#000" stroke-width="1"/>
  <line x1="136" y1="158" x2="144" y2="158" stroke="#000" stroke-width="0.7"/>
  <line x1="140" y1="154" x2="140" y2="162" stroke="#000" stroke-width="0.7"/>
  <text x="150" y="162" font-size="9">Encoder (AS5600)</text>

  <!-- Servo brake shoulder -->
  <rect x="118" y="166" width="16" height="11" fill="none" stroke="#000" stroke-width="1"/>
  <line x1="118" y1="166" x2="134" y2="177" stroke="#000" stroke-width="0.8"/>
  <line x1="134" y1="166" x2="118" y2="177" stroke="#000" stroke-width="0.8"/>
  <text x="140" y="175" font-size="9">Servo brake (MG90S)</text>

  <!-- UPPER ARM RAIL -->
  <rect x="130" y="182" width="20" height="115" fill="#efefef" stroke="#000" stroke-width="1.2" rx="3"/>
  <line x1="140" y1="182" x2="140" y2="297" stroke="#888" stroke-width="0.6" stroke-dasharray="5,3"/>
  <!-- Dimension line upper arm -->
  <line x1="160" y1="182" x2="160" y2="297" stroke="#000" stroke-width="0.7"/>
  <line x1="156" y1="182" x2="164" y2="182" stroke="#000" stroke-width="0.7"/>
  <line x1="156" y1="297" x2="164" y2="297" stroke="#000" stroke-width="0.7"/>
  <text x="175" y="244" font-size="10" transform="rotate(-90,175,244)">~400 mm</text>
  <!-- Vib motors upper arm -->
  <circle cx="127" cy="210" r="4" fill="#bbb" stroke="#000" stroke-width="0.8"/>
  <circle cx="127" cy="240" r="4" fill="#bbb" stroke="#000" stroke-width="0.8"/>
  <circle cx="127" cy="270" r="4" fill="#bbb" stroke="#000" stroke-width="0.8"/>
  <text x="117" y="242" text-anchor="end" font-size="9">Vib. motors</text>
  <!-- Linear carriage upper arm (q4) -->
  <rect x="122" y="222" width="36" height="20" fill="#ccc" stroke="#000" stroke-width="1.2" rx="2"/>
  <text x="166" y="230" font-size="10">q&#x2084; (prismatic)</text>
  <text x="166" y="240" font-size="9">Linear rail carriage</text>
  <line x1="140" y1="244" x2="140" y2="258" stroke="#000" stroke-width="1" marker-end="url(#arr)" marker-start="url(#arrb)"/>

  <!-- ELBOW HINGE -->
  <g transform="translate(140,300)">
    <rect x="-24" y="-9" width="48" height="18" fill="#ddd" stroke="#000" stroke-width="1.2" rx="5"/>
    <circle cx="0" cy="0" r="7" fill="white" stroke="#000" stroke-width="1.2"/>
    <path d="M-16,-16 A22,22 0 0,1 16,-16" fill="none" stroke="#555" stroke-width="1" marker-end="url(#sarr)"/>
    <text x="28" y="-8" font-size="10">q&#x2085; (elbow flexion)</text>
    <text x="-76" y="4" text-anchor="end" font-size="10" font-weight="bold">Elbow hinge</text>
  </g>
  <!-- Encoder elbow -->
  <circle cx="140" cy="320" r="6" fill="none" stroke="#000" stroke-width="1"/>
  <line x1="136" y1="320" x2="144" y2="320" stroke="#000" stroke-width="0.7"/>
  <line x1="140" y1="316" x2="140" y2="324" stroke="#000" stroke-width="0.7"/>
  <!-- Servo brake elbow -->
  <rect x="118" y="324" width="16" height="11" fill="none" stroke="#000" stroke-width="1"/>
  <line x1="118" y1="324" x2="134" y2="335" stroke="#000" stroke-width="0.8"/>
  <line x1="134" y1="324" x2="118" y2="335" stroke="#000" stroke-width="0.8"/>

  <!-- FOREARM RAIL -->
  <rect x="130" y="338" width="20" height="100" fill="#efefef" stroke="#000" stroke-width="1.2" rx="3"/>
  <line x1="140" y1="338" x2="140" y2="438" stroke="#888" stroke-width="0.6" stroke-dasharray="5,3"/>
  <!-- Dimension forearm -->
  <line x1="160" y1="338" x2="160" y2="438" stroke="#000" stroke-width="0.7"/>
  <line x1="156" y1="338" x2="164" y2="338" stroke="#000" stroke-width="0.7"/>
  <line x1="156" y1="438" x2="164" y2="438" stroke="#000" stroke-width="0.7"/>
  <text x="175" y="392" font-size="10" transform="rotate(-90,175,392)">~350 mm</text>
  <!-- Vib motors forearm -->
  <circle cx="127" cy="358" r="4" fill="#bbb" stroke="#000" stroke-width="0.8"/>
  <circle cx="127" cy="388" r="4" fill="#bbb" stroke="#000" stroke-width="0.8"/>
  <circle cx="127" cy="418" r="4" fill="#bbb" stroke="#000" stroke-width="0.8"/>
  <!-- Linear carriage forearm (q6) -->
  <rect x="122" y="372" width="36" height="20" fill="#ccc" stroke="#000" stroke-width="1.2" rx="2"/>
  <text x="166" y="380" font-size="10">q&#x2086; (prismatic)</text>
  <text x="166" y="390" font-size="9">Forearm slider</text>
  <line x1="140" y1="394" x2="140" y2="406" stroke="#000" stroke-width="1" marker-end="url(#arr)" marker-start="url(#arrb)"/>

  <!-- WRIST JOINT -->
  <g transform="translate(140,442)">
    <rect x="-18" y="-8" width="36" height="16" fill="#ddd" stroke="#000" stroke-width="1.2" rx="4"/>
    <circle cx="0" cy="0" r="6" fill="white" stroke="#000" stroke-width="1.2"/>
    <path d="M-13,-13 A18,18 0 0,1 13,-13" fill="none" stroke="#555" stroke-width="1" marker-end="url(#sarr)"/>
    <text x="22" y="4" font-size="10">q&#x2087; (wrist rotation)</text>
    <text x="-76" y="4" text-anchor="end" font-size="10" font-weight="bold">Wrist</text>
  </g>
  <!-- Encoder wrist -->
  <circle cx="140" cy="460" r="6" fill="none" stroke="#000" stroke-width="1"/>
  <line x1="136" y1="460" x2="144" y2="460" stroke="#000" stroke-width="0.7"/>
  <line x1="140" y1="456" x2="140" y2="464" stroke="#000" stroke-width="0.7"/>

  <!-- STRAPS -->
  <path d="M112,255 Q95,263 112,271" fill="none" stroke="#333" stroke-width="2.5" stroke-dasharray="4,2"/>
  <path d="M168,255 Q185,263 168,271" fill="none" stroke="#333" stroke-width="2.5" stroke-dasharray="4,2"/>
  <path d="M113,400 Q96,408 113,416" fill="none" stroke="#333" stroke-width="2.5" stroke-dasharray="4,2"/>
  <path d="M167,400 Q184,408 167,416" fill="none" stroke="#333" stroke-width="2.5" stroke-dasharray="4,2"/>

  <!-- ELECTRONICS BLOCK -->
  <rect x="490" y="145" width="90" height="40" fill="#eee" stroke="#000" stroke-width="1.2" rx="2"/>
  <text x="535" y="161" text-anchor="middle" font-size="10" font-weight="bold">ESP-S30 ×3</text>
  <text x="535" y="173" text-anchor="middle" font-size="9">MCU / WiFi / BLE</text>
  <rect x="490" y="198" width="90" height="30" fill="#eee" stroke="#000" stroke-width="1.2" rx="2"/>
  <text x="535" y="212" text-anchor="middle" font-size="9" font-weight="bold">TCA9548A</text>
  <text x="535" y="222" text-anchor="middle" font-size="9">I2C Multiplexer</text>
  <rect x="490" y="242" width="90" height="30" fill="#eee" stroke="#000" stroke-width="1.2" rx="2"/>
  <text x="535" y="256" text-anchor="middle" font-size="9" font-weight="bold">Power Bank</text>
  <text x="535" y="266" text-anchor="middle" font-size="9">20 000 mAh USB-C</text>
  <!-- bus line -->
  <line x1="490" y1="165" x2="450" y2="165" stroke="#555" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="450" y1="165" x2="450" y2="300" stroke="#555" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="450" y1="300" x2="170" y2="300" stroke="#555" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="455" y="235" font-size="9">I2C / PWM bus</text>

  <!-- LEGEND -->
  <rect x="490" y="305" width="230" height="130" fill="none" stroke="#000" stroke-width="1"/>
  <text x="605" y="322" text-anchor="middle" font-size="11" font-weight="bold">LEGEND</text>
  <line x1="490" y1="326" x2="720" y2="326" stroke="#000" stroke-width="0.5"/>
  <circle cx="508" cy="342" r="6" fill="none" stroke="#000" stroke-width="1"/>
  <line x1="504" y1="342" x2="512" y2="342" stroke="#000" stroke-width="0.7"/>
  <line x1="508" y1="338" x2="508" y2="346" stroke="#000" stroke-width="0.7"/>
  <text x="520" y="346" font-size="10">Magnetic encoder (AS5600)</text>
  <rect x="500" y="356" width="16" height="11" fill="none" stroke="#000" stroke-width="1"/>
  <line x1="500" y1="356" x2="516" y2="367" stroke="#000" stroke-width="0.8"/>
  <line x1="516" y1="356" x2="500" y2="367" stroke="#000" stroke-width="0.8"/>
  <text x="522" y="366" font-size="10">Servo brake (MG90S)</text>
  <circle cx="508" cy="382" r="4" fill="#bbb" stroke="#000" stroke-width="0.8"/>
  <text x="518" y="386" font-size="10">Vibration motor ×24</text>
  <rect x="500" y="394" width="22" height="11" fill="#ccc" stroke="#000" stroke-width="1" rx="1"/>
  <text x="528" y="403" font-size="10">Linear rail carriage</text>
  <path d="M500,415 Q497,420 500,425" fill="none" stroke="#333" stroke-width="2.5" stroke-dasharray="4,2"/>
  <text x="508" y="422" font-size="10">Attachment strap</text>

  <!-- DH PARAM TABLE -->
  <rect x="290" y="130" width="185" height="155" fill="none" stroke="#000" stroke-width="1"/>
  <text x="382" y="148" text-anchor="middle" font-size="11" font-weight="bold">DH Parameters</text>
  <line x1="290" y1="152" x2="475" y2="152" stroke="#000" stroke-width="0.7"/>
  <text x="305" y="165" font-size="9" font-weight="bold">Joint</text>
  <text x="348" y="165" font-size="9" font-weight="bold">&#952;ᵢ</text>
  <text x="378" y="165" font-size="9" font-weight="bold">&#945;ᵢ</text>
  <text x="408" y="165" font-size="9" font-weight="bold">dᵢ</text>
  <text x="445" y="165" font-size="9" font-weight="bold">rᵢ</text>
  <line x1="290" y1="169" x2="475" y2="169" stroke="#000" stroke-width="0.5"/>
  <text x="305" y="181" font-size="9">2</text><text x="335" y="181" font-size="9">q₂+π/2</text><text x="378" y="181" font-size="9">π/2</text><text x="408" y="181" font-size="9">0</text><text x="445" y="181" font-size="9">0</text>
  <text x="305" y="193" font-size="9">3</text><text x="335" y="193" font-size="9">q₃+π/2</text><text x="378" y="193" font-size="9">π/2</text><text x="408" y="193" font-size="9">0</text><text x="445" y="193" font-size="9">0</text>
  <text x="305" y="205" font-size="9">4</text><text x="335" y="205" font-size="9">q₄+π/2</text><text x="378" y="205" font-size="9">-π/2</text><text x="408" y="205" font-size="9">0</text><text x="445" y="205" font-size="9">0</text>
  <text x="305" y="217" font-size="9">5</text><text x="335" y="217" font-size="9">q₅+π</text><text x="378" y="217" font-size="9">-π/2</text><text x="408" y="217" font-size="9">q₆</text><text x="445" y="217" font-size="9">0</text>
  <text x="305" y="229" font-size="9">6</text><text x="335" y="229" font-size="9">q₇+π/2</text><text x="378" y="229" font-size="9">π/2</text><text x="408" y="229" font-size="9">0</text><text x="445" y="229" font-size="9">0</text>
  <text x="305" y="241" font-size="9">7</text><text x="335" y="241" font-size="9">q₉+π/2</text><text x="378" y="241" font-size="9">π/2</text><text x="408" y="241" font-size="9">q₈</text><text x="445" y="241" font-size="9">0</text>
  <text x="305" y="253" font-size="9">8</text><text x="335" y="253" font-size="9">q₁₀+π/2</text><text x="378" y="253" font-size="9">π/2</text><text x="408" y="253" font-size="9">0</text><text x="445" y="253" font-size="9">q₁₁</text>
  <text x="382" y="276" text-anchor="middle" font-size="9">(joints 0–4 collapse to same point)</text>
</svg>
